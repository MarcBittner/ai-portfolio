name: projects-ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - pii-redactor
          - evalkit
          - doc-extract
          - agent-sandbox
          - promptguard
          - synth-data
          - forecast
          - multimodal-ocr
          - reconcile
          - llm-gateway
          - slo-kit
          - field-vault
          - rtc-guard
          - rate-atlas
          - attack-surface
          - txn-ledger
          - agent-factory
    defaults:
      run:
        working-directory: projects/${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - run: pip install -e ".[dev]"
      - run: ruff check src tests
      - run: pytest -q
