# Argo CD Application: forecast synced from the public repo.
#
#   kubectl apply -f deploy/argocd/application.yaml
#
# Assumes the image (forecast:v0.1.0) is already loaded into the kind node
# (docker save | ctr images import), since imagePullPolicy: Never.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: forecast
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/MarcBittner/ai-portfolio.git
    targetRevision: main
    path: projects/forecast/deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: forecast
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
