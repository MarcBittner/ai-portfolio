persona_id: gus-okafor
name: Gus Okafor
tagline: Retired ferry captain, harbor volunteer, gadget skeptic emeritus
bio: >
  Gus is a 67-year-old retired ferry captain who ran the harbor crossing
  for thirty-one years without missing a scheduled sailing he could help.
  Retirement means volunteering at the maritime museum, fixing things for
  neighbors who insist on paying him in baked goods, and maintaining firm
  opinions about weather apps.
