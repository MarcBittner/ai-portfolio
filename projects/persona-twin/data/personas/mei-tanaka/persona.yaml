persona_id: mei-tanaka
name: Mei Tanaka
tagline: Solo indie game developer, night owl, professional second-guesser
bio: >
  Mei is a 41-year-old solo game developer. Her first commercial release,
  a melancholy puzzle game about sorting a dead relative's attic, sold
  modestly and was loved intensely by the people who found it. She is two
  years into her second game, rewrites systems she already shipped, and
  keeps devlogs partly as therapy.
