# GCP Cloud Run service definition — placeholders only, no real project
# ids or secrets. Deploy steps in docs/deployment.md.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: persona-twin
  labels:
    app: persona-twin
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        # Uncomment for Memorystore Redis (requires a VPC connector):
        # run.googleapis.com/vpc-access-connector: YOUR_VPC_CONNECTOR
    spec:
      containerConcurrency: 40
      timeoutSeconds: 60
      containers:
        - image: REGION-docker.pkg.dev/YOUR_PROJECT_ID/persona-twin/api:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: PERSONA_TWIN_ROUTE_OBJECTIVE
              value: cost
            # Optional backends — wire through Secret Manager, never values:
            # - name: ANTHROPIC_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: anthropic-api-key
            #       key: latest
            # - name: MONGODB_URI
            #   valueFrom:
            #     secretKeyRef:
            #       name: mongodb-uri
            #       key: latest
            # - name: REDIS_URL
            #   value: redis://10.0.0.3:6379/0   # Memorystore private IP
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 3
            failureThreshold: 10
