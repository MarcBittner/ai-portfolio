# Observability stack for persona-twin: Prometheus scrapes the app's
# /metrics endpoint; Grafana renders a committed dashboard. Both run in the
# persona-twin namespace and are synced by the same Argo Application as the
# app. Images are side-loaded into the kind node (imagePullPolicy: Never),
# same as the app — see the deploy notes in persona-twin.yaml.
#
# Data is emptyDir (demo-grade; metrics history resets on pod restart).
# Grafana allows anonymous Admin so the dashboard is viewable without login.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: persona-twin
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: persona-twin
        metrics_path: /metrics
        static_configs:
          - targets: ['persona-twin.persona-twin.svc.cluster.local:80']
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: persona-twin
  labels: { app: prometheus }
spec:
  replicas: 1
  selector:
    matchLabels: { app: prometheus }
  template:
    metadata:
      labels: { app: prometheus }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v3.1.0
          imagePullPolicy: Never
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=6h
          ports:
            - containerPort: 9090
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            - { name: data, mountPath: /prometheus }
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: persona-twin
spec:
  selector: { app: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: persona-twin
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.persona-twin.svc.cluster.local:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: persona-twin
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: persona-twin
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-persona-twin
  namespace: persona-twin
data:
  persona-twin.json: |
    {
      "uid": "persona-twin",
      "title": "persona-twin",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": { "list": [] },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "LLM latency p95 (ms) by provider",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "ms" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "histogram_quantile(0.95, sum(rate(persona_twin_llm_latency_ms_bucket[5m])) by (le, provider))",
              "legendFormat": "{{provider}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "LLM requests/sec by provider/model",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(persona_twin_llm_requests_total[5m])) by (provider, model)",
              "legendFormat": "{{provider}}/{{model}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Answer cache hit ratio",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(persona_twin_cache_events_total{result=\"hit\"}) / clamp_min(sum(persona_twin_cache_events_total), 1)"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Circuit opens (1h increase) by target",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(increase(persona_twin_circuit_opens_total[1h])) by (target)",
              "legendFormat": "{{target}}"
            }
          ]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Chunks indexed",
          "gridPos": { "h": 6, "w": 4, "x": 16, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [{ "refId": "A", "expr": "max(persona_twin_chunks_indexed)" }]
        },
        {
          "id": 6,
          "type": "stat",
          "title": "Personas",
          "gridPos": { "h": 6, "w": 4, "x": 20, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [{ "refId": "A", "expr": "max(persona_twin_personas)" }]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: persona-twin
  labels: { app: grafana }
spec:
  replicas: 1
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.4.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - { name: GF_SECURITY_ADMIN_USER, value: admin }
            - { name: GF_SECURITY_ADMIN_PASSWORD, value: admin }
            - { name: GF_AUTH_ANONYMOUS_ENABLED, value: "true" }
            - { name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: Admin }
            - { name: GF_USERS_DEFAULT_THEME, value: light }
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { cpu: 500m, memory: 512Mi }
          volumeMounts:
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dashboard-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /var/lib/grafana/dashboards }
            - { name: data, mountPath: /var/lib/grafana }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: datasources
          configMap: { name: grafana-datasources }
        - name: dashboard-provider
          configMap: { name: grafana-dashboard-provider }
        - name: dashboards
          configMap: { name: grafana-dashboard-persona-twin }
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: persona-twin
spec:
  selector: { app: grafana }
  ports:
    - port: 3000
      targetPort: 3000
