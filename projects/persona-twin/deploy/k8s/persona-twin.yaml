# Local Kubernetes deployment (tested on kind). The image is loaded
# directly into the node (`kind load docker-image persona-twin:v0.14.1`
# or `docker save | ctr images import`), hence imagePullPolicy: Never.
#
#   kubectl apply -f deploy/k8s/persona-twin.yaml
#   curl http://<node-ip>:30080/health
#
# Offline by default; add real backends as a Secret and uncomment the
# envFrom block.
apiVersion: v1
kind: Namespace
metadata:
  name: persona-twin
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: persona-twin-benchmarks
  namespace: persona-twin
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: persona-twin-personas
  namespace: persona-twin
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: persona-twin
  namespace: persona-twin
  labels:
    app: persona-twin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: persona-twin
  template:
    metadata:
      labels:
        app: persona-twin
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001  # PVC mounts group-writable for the app user
      containers:
        - name: api
          image: persona-twin:v0.14.1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: PERSONA_TWIN_ROUTE_OBJECTIVE
              value: cost
            # Pin generation to a smaller local model to cap memory: gemma3:12b
            # is ~8GB resident, llama3.1:8b ~4.5GB. Adjust/remove to taste.
            - name: PERSONA_TWIN_ROUTE_PINS
              value: "twin_answer=ollama:llama3.1:8b,twin_chat=ollama:llama3.1:8b,twin_interview=ollama:llama3.1:8b,query_rewrite=ollama:llama3.1:8b,eval_judge=ollama:llama3.1:8b"
            # Local Ollama on the host (Docker Desktop host gateway).
            # Remove if no Ollama is running; discovery fails safe.
            - name: OLLAMA_BASE_URL
              value: http://192.168.65.254:11434
            # OpenRouter (free-model discovery at startup). The Secret is
            # created out-of-band — never committed:
            #   kubectl -n persona-twin create secret generic \
            #     persona-twin-providers --from-literal=OPENROUTER_API_KEY=...
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: persona-twin-providers
                  key: OPENROUTER_API_KEY
                  optional: true   # pods start fine without it
            # Benchmark results persist across pod restarts (PVC below)
            - name: PERSONA_TWIN_BENCH_DIR
              value: /benchmarks
            # Browser-created twins persist across pod restarts (PVC below)
            - name: PERSONA_TWIN_USER_PERSONAS_DIR
              value: /user-personas
          # envFrom:
          #   - secretRef:
          #       name: persona-twin-providers   # ANTHROPIC_API_KEY etc.
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: benchmarks
              mountPath: /benchmarks
            - name: personas
              mountPath: /user-personas
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: benchmarks
          persistentVolumeClaim:
            claimName: persona-twin-benchmarks
        - name: personas
          persistentVolumeClaim:
            claimName: persona-twin-personas
---
apiVersion: v1
kind: Service
metadata:
  name: persona-twin
  namespace: persona-twin
spec:
  type: NodePort
  selector:
    app: persona-twin
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
