<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="b" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6aa1ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#6aa1ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="v" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9b86ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#9b86ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="c" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4fd6e8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4fd6e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="t" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#43c98a" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#43c98a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="i" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c6cff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c6cff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft colour glow orbs: the palette -->
  <g>
    <circle cx="220" cy="150" r="380" fill="url(#b)"/>
    <circle cx="1280" cy="120" r="400" fill="url(#v)"/>
    <circle cx="1360" cy="760" r="380" fill="url(#c)"/>
    <circle cx="160" cy="840" r="360" fill="url(#t)"/>
    <circle cx="720" cy="470" r="340" fill="url(#i)"/>
    <circle cx="900" cy="860" r="300" fill="url(#b)"/>
  </g>

  <!-- crisp bokeh: defined edges so the frosted panes visibly blur them -->
  <g fill="#ffffff">
    <circle cx="120" cy="300" r="6" opacity="0.30"/>
    <circle cx="340" cy="120" r="10" opacity="0.22"/>
    <circle cx="520" cy="240" r="4" opacity="0.35"/>
    <circle cx="640" cy="80" r="14" opacity="0.16"/>
    <circle cx="800" cy="200" r="7" opacity="0.26"/>
    <circle cx="980" cy="120" r="5" opacity="0.32"/>
    <circle cx="1120" cy="320" r="12" opacity="0.18"/>
    <circle cx="1280" cy="440" r="6" opacity="0.28"/>
    <circle cx="60" cy="520" r="9" opacity="0.22"/>
    <circle cx="300" cy="600" r="5" opacity="0.32"/>
    <circle cx="470" cy="520" r="11" opacity="0.18"/>
    <circle cx="620" cy="660" r="6" opacity="0.28"/>
    <circle cx="820" cy="560" r="4" opacity="0.36"/>
    <circle cx="980" cy="700" r="13" opacity="0.16"/>
    <circle cx="1180" cy="640" r="6" opacity="0.30"/>
    <circle cx="1340" cy="560" r="9" opacity="0.22"/>
    <circle cx="200" cy="760" r="7" opacity="0.26"/>
    <circle cx="520" cy="820" r="5" opacity="0.32"/>
    <circle cx="760" cy="780" r="10" opacity="0.20"/>
    <circle cx="1080" cy="840" r="6" opacity="0.28"/>
    <circle cx="1260" cy="820" r="4" opacity="0.34"/>
    <circle cx="420" cy="380" r="6" opacity="0.28"/>
    <circle cx="1180" cy="180" r="5" opacity="0.30"/>
    <circle cx="700" cy="360" r="4" opacity="0.34"/>
  </g>

  <!-- thin rings: more crisp linework for the frost to bend -->
  <g fill="none" stroke-width="2">
    <circle cx="560" cy="300" r="120" stroke="#9b86ff" stroke-opacity="0.22"/>
    <circle cx="1040" cy="560" r="90" stroke="#4fd6e8" stroke-opacity="0.22"/>
    <circle cx="300" cy="560" r="150" stroke="#6aa1ff" stroke-opacity="0.16"/>
    <circle cx="940" cy="260" r="70" stroke="#7c6cff" stroke-opacity="0.22"/>
    <circle cx="780" cy="720" r="110" stroke="#43c98a" stroke-opacity="0.18"/>
  </g>
</svg>
