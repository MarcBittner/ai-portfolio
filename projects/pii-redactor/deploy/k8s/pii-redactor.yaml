# Local Kubernetes deployment (tested on kind). The image is loaded
# directly into the node (`docker save | ctr images import`), hence
# imagePullPolicy: Never. Synced by Argo from deploy/argocd/application.yaml.
#
#   kubectl apply -f deploy/k8s/pii-redactor.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: pii-redactor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pii-redactor
  namespace: pii-redactor
  labels: { app: pii-redactor }
spec:
  replicas: 1
  selector:
    matchLabels: { app: pii-redactor }
  template:
    metadata:
      labels: { app: pii-redactor }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: api
          image: pii-redactor:v0.1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: pii-redactor
  namespace: pii-redactor
spec:
  selector: { app: pii-redactor }
  ports:
    - port: 80
      targetPort: 8080
