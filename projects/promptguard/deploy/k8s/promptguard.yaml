# Local Kubernetes deployment (tested on kind). The image is loaded directly
# into the node (`docker save | ctr images import`), hence imagePullPolicy: Never.
# Synced by Argo from deploy/argocd/application.yaml.
#
#   kubectl apply -f deploy/k8s/promptguard.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: promptguard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: promptguard
  namespace: promptguard
  labels: { app: promptguard }
spec:
  replicas: 1
  selector:
    matchLabels: { app: promptguard }
  template:
    metadata:
      labels: { app: promptguard }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: api
          image: promptguard:v0.1.0
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: promptguard
  namespace: promptguard
spec:
  selector: { app: promptguard }
  ports:
    - port: 80
      targetPort: 8080
