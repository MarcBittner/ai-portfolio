version: '3.8'

services:
  teaser-site:
    image: ghcr.io/tanglement-ai/teaser-site:latest
    container_name: tanglement-teaser-site
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      # Application
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${SITE_URL:-https://tanglement.ai}

      # Database
      - DATABASE_URL=${DATABASE_URL}

      # Email
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL:-hello@tanglement.ai}

      # Email Marketing
      - CONVERTKIT_API_KEY=${CONVERTKIT_API_KEY}
      - CONVERTKIT_FORM_ID=${CONVERTKIT_FORM_ID}

      # Analytics
      - NEXT_PUBLIC_PLAUSIBLE_DOMAIN=${PLAUSIBLE_DOMAIN:-tanglement.ai}

      # Error Tracking
      - SENTRY_DSN=${SENTRY_DSN}
      - NEXT_PUBLIC_SENTRY_DSN=${NEXT_PUBLIC_SENTRY_DSN}

    volumes:
      # Optional: persist logs
      - ./logs:/app/logs

    networks:
      - tanglement-network

    labels:
      # Metadata
      - "com.tanglement.service=teaser-site"
      - "com.tanglement.version=1.0.0"

      # Traefik labels (if using reverse proxy)
      - "traefik.enable=true"
      - "traefik.http.routers.teaser-site.rule=Host(`tanglement.ai`) || Host(`www.tanglement.ai`)"
      - "traefik.http.routers.teaser-site.entrypoints=websecure"
      - "traefik.http.routers.teaser-site.tls.certresolver=letsencrypt"
      - "traefik.http.services.teaser-site.loadbalancer.server.port=3000"

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # Optional: PostgreSQL database (if not using managed service)
  postgres:
    image: postgres:16-alpine
    container_name: tanglement-postgres
    restart: unless-stopped

    environment:
      - POSTGRES_DB=tanglement
      - POSTGRES_USER=${POSTGRES_USER:-tanglement}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

    networks:
      - tanglement-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tanglement}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  tanglement-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
