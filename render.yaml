# Render Blueprint — the Blueprint-managed free Docker services for this repo.
# Other demos (and postureline/burnrate/baseplate) are managed via the Render API,
# not this Blueprint — keep them OUT of here to avoid duplicate blueprint services.
# Free tier sleeps after ~15 min idle and cold-starts in ~30-60s; runs fully offline.
services:
  - type: web
    name: persona-twin
    runtime: docker
    plan: free
    dockerfilePath: ./projects/persona-twin/Dockerfile
    dockerContext: ./projects/persona-twin
    healthCheckPath: /health
    envVars:
      - key: PERSONA_TWIN_ROUTE_OBJECTIVE
        value: cost
  # relaytoken — scoped WebRTC room access tokens (Go) + adversarial breaker suite.
  - type: web
    name: relaytoken
    runtime: docker
    plan: free
    dockerfilePath: ./projects/relaytoken/Dockerfile
    dockerContext: ./projects/relaytoken
    healthCheckPath: /healthz
  # cycleledger — Rails contributions data layer (Postgres partitioning + query-plan artifact).
  - type: web
    name: cycleledger
    runtime: docker
    plan: free
    dockerfilePath: ./projects/cycleledger/Dockerfile
    dockerContext: ./projects/cycleledger
    healthCheckPath: /up
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cycleledger-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: RAILS_LOG_TO_STDOUT
        value: "1"
      - key: LLM_MODE
        value: auto
  # quorum — vendor-neutral multi-agent orchestration framework.
  - type: web
    name: quorum
    runtime: docker
    plan: free
    dockerfilePath: ./projects/quorum/Dockerfile
    dockerContext: ./projects/quorum
    healthCheckPath: /health

databases:
  - name: cycleledger-db
    plan: free
    postgresMajorVersion: "15"
